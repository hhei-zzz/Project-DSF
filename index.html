<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="big2style.css">
</head>
<body>
  <h1>Join Big2</h1>

  <form id="join-form">
    <input id="player-name" type="text" placeholder="Enter your name" required>
    <button type="submit">Join Game</button>
  </form>

  <script>
    const API_BASE = "https://clause-knives-giving-wrote.trycloudflare.com";
    const form = document.querySelector("#join-form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.querySelector("#player-name").value.trim();

      try {
        const res = await fetch(`${API_BASE}/join`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ name })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || "Could not join");
          return;
        }

        sessionStorage.setItem("player_id", data.player_id);
        sessionStorage.setItem("player_name", data.name);
        sessionStorage.setItem("seat", data.seat);
        sessionStorage.setItem("game_id", data.game_id);

        window.location.href = "big2gameui.html";
      } catch (err) {
        console.error(err);
        alert("Join failed");
      }
    });
  </script>
</body>
</html>
